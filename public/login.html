<!DOCTYPE html>
<html lang='en'>
	<head>
		<meta charset='utf-8'>
		<meta name='viewport' content='width=device-width initial-scale=1.0'>
		<link rel='stylesheet' href='styles.css'>
	</head>
	<body>
		<nav>
			<div id="nav-link-container">
				<a class="nav-link" href="/home">
					Home
				</a>
			</div>
		</nav>

		<fieldset id="field">
			<div id="login-container">
				<h1 class="login-labels">
					Username:
				</h1>
				<input class="login-input" type="text" id="username-input" maxlength="30" placeholder="Username">

				<h1 class="login-labels">
					Password:
				</h1>
				<input class="login-input" type="password" id="password-input" maxlength="30" placeholder="Password">
				
				<button class="buttons" id="login-button" type="button">
					Login
				</button>

				<a href="/register">
					<button class="buttons" id="create-account" type="button">
						Create Account
					</button>
				</a>
				<div id="account-fail" class="fail-message hidden">
					<p>
						Please check input fields
					</p>
				</div>
				<div id="username-fail" class="fail-message hidden">
					<p>
						Username taken
					</p>
				</div>
			</div>
			
		</fieldset>
		<div id="success" class="hidden">
			<h1 class="success-message">
				Login successful
			</h1>
		</div>
		<script src="script.js"></script>
	</body>
</html>
